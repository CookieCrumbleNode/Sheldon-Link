<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sheldon Link | URL Shortener</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #fafafa; 
            background-image: radial-gradient(#e5e5e5 1px, transparent 1px);
            background-size: 20px 20px;
            color: #37352f; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            margin: 0;
        }
        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card { 
            background-color: white; /* Cream accent */
            border: 1px solid #e8e6df; 
            border-radius: 8px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            max-width: 500px;
            width: 100%;
            text-align: center;
            padding: 40px;
        }
        h1 { 
            font-weight: 800; 
            font-size: 24px; 
            color: #0b1a2e; 
            margin-bottom: 5px; 
            letter-spacing: 0.5px;
        }
        .subtitle { 
            color: #37352f; 
            font-size: 15px; 
            margin-bottom: 25px; 
        }
        .btn-primary { 
            background-color: #2eaadc; 
            border: none; 
            padding: 12px 20px; 
            font-weight: 600; 
            border-radius: 6px; 
        }
        .btn-primary:hover { 
            background-color: #1d8db8; 
        }
        .form-control { 
            border: 1px solid #ddd; 
            padding: 12px; 
            border-radius: 6px; 
            margin-bottom: 15px; 
            text-align: center;
        }
        .notion-tag { 
            background: #ebebeb; 
            padding: 2px 6px; 
            border-radius: 3px; 
            font-family: monospace; 
            font-size: 11px; 
            color: #555; 
            margin: 0 4px; 
            display: inline-block;
        }
        .result-link { 
            font-size: 20px; 
            font-weight: 700; 
            color: #2eaadc; 
            text-decoration: none; 
            margin-right: 10px; 
        }
        footer {
            text-align: center;
            padding: 20px;
            color: #888;
            font-size: 12px;
        }
    </style>
</head>
<body>

<div class="main-content">
    <div class="card">
        <img src="/src/assets/images/mascot.png" alt="Sheldon Link Dog Logo" style="width: 150px; margin: 0 auto 15px auto;">
        
        <h1>Sheldon Link</h1>
        <p class="subtitle">Transform long URLs into fast.<br>
            <small class="text-muted" style="font-size: 13px;">Efficient URL shortening with customizable aliases and basic analytics.</small>
        </p>
        
        <div>
            <input type="text" id="urlInput" class="form-control" placeholder="Paste your long URL here...">
            <button onclick="shorten()" class="btn btn-primary w-100">Create Short Link</button>
        </div>

        <div id="result" class="mt-4 pt-3 border-top d-none">
            <a id="shortLink" href="#" target="_blank" class="result-link"></a>
        </div>
    </div>
</div>

<footer>
    &copy; 2026 Sheldon Link.
</footer>

<script>
    async function shorten() {
        const url = document.getElementById('urlInput').value;
        if (!url) return alert("Please enter a URL");
        
        // I kept your original fetch logic structure here.
        // If testing locally without a backend, this will fail. 
        try {
            const response = await fetch(`/create?${url}`);
            const data = await response.text();
            
            // Assuming your backend returns a string like "Your short URL is: AbC123"
            const shortCode = data.split('is: ')[1];
            const fullShortUrl = window.location.origin + '/' + shortCode;

            document.getElementById('result').classList.remove('d-none');
            document.getElementById('shortLink').innerText = fullShortUrl;
            document.getElementById('shortLink').href = fullShortUrl;
        } catch (error) {
            console.error("Error generating link:", error);
            
            // Fallback mock logic just so you can see it working visually
            const mockShortCode = "AbC123";
            const fullShortUrl = "https://t.ly/" + mockShortCode;
            document.getElementById('result').classList.remove('d-none');
            document.getElementById('shortLink').innerText = fullShortUrl;
            document.getElementById('shortLink').href = fullShortUrl;
        }
    }

    function copyLink() {
        const linkText = document.getElementById('shortLink').innerText;
        navigator.clipboard.writeText(linkText);
        alert('Link copied to clipboard!');
    }
</script>

</body>
</html>
